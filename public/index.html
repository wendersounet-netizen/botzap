<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZapBot Control</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
:root {
    --bg:           #05050a;
    --surf:         #0c0c14;
    --surf2:        #11111c;
    --surf3:        #161624;
    --border:       #1c1c2e;
    --border2:      #252540;
    --primary:      #00e5a0;
    --primary-glow: rgba(0, 229, 160, 0.15);
    --primary-dim:  rgba(0, 229, 160, 0.08);
    --blue:         #4d8fff;
    --blue-dim:     rgba(77, 143, 255, 0.1);
    --text:         #d8dff0;
    --text2:        #8892a8;
    --muted:        #3a4055;
    --red:          #ff4466;
    --red-dim:      rgba(255, 68, 102, 0.08);
    --amber:        #ffb300;
    --amber-dim:    rgba(255, 179, 0, 0.08);
    --mono:         'JetBrains Mono', monospace;
    --display:      'Orbitron', monospace;
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12.5px;
    display: flex;
    flex-direction: column;
}

/* ─── SCROLLBAR ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ─── TOPBAR ─────────────────────────────────────────────────────────────── */
.topbar {
    flex-shrink: 0;
    height: 52px;
    background: var(--surf);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
}
.logo {
    font-family: var(--display);
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 3px;
    color: var(--primary);
    text-shadow: 0 0 20px rgba(0,229,160,.4);
    flex-shrink: 0;
}
.logo em { color: var(--blue); font-style: normal; }

.topbar-divider { width: 1px; height: 24px; background: var(--border); }

.global-stats { display: flex; gap: 12px; }
.gstat {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--text2);
}
.gstat-val { font-weight: 700; }
.gstat-val.g   { color: var(--primary); }
.gstat-val.r   { color: var(--red); }
.gstat-val.a   { color: var(--amber); }

.topbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

.ws-indicator {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; color: var(--text2);
}
.ws-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); }
.ws-dot.on { background:var(--primary); box-shadow:0 0 6px var(--primary); }

.topbtn {
    height: 30px;
    padding: 0 12px;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 11px;
    border-radius: 4px;
    cursor: pointer;
    transition: all .15s;
}
.topbtn:hover { border-color: var(--primary); color: var(--primary); }

/* ─── LAYOUT ─────────────────────────────────────────────────────────────── */
.workspace {
    flex: 1;
    display: grid;
    grid-template-columns: 248px 1fr;
    overflow: hidden;
}

/* ─── SIDEBAR ────────────────────────────────────────────────────────────── */
.sidebar {
    background: var(--surf);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.sidebar-head {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 9.5px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text2);
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.phones-list { flex: 1; overflow-y: auto; padding: 6px; }

.phone-card {
    position: relative;
    border: 1px solid var(--border);
    background: var(--surf2);
    border-radius: 6px;
    padding: 11px 12px 11px 36px;
    margin-bottom: 5px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    overflow: hidden;
}
.phone-card::before {
    content:'';
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: all .3s;
}
.phone-card.s-ready::before   { background:var(--primary); box-shadow:0 0 8px var(--primary); }
.phone-card.s-qr::before      { background:var(--amber);   box-shadow:0 0 8px var(--amber); animation:blink 1s ease infinite; }
.phone-card.s-initializing::before { background:var(--blue); box-shadow:0 0 8px var(--blue); animation:blink .8s ease infinite; }
.phone-card.s-disconnected::before, .phone-card.s-auth_failed::before, .phone-card.s-error::before { background:var(--red); }

.phone-card:hover    { border-color: var(--border2); background: var(--surf3); }
.phone-card.selected { border-color: var(--primary); background: var(--primary-dim); }
.phone-card.selected::before { box-shadow: 0 0 12px var(--primary); }

.pc-label { font-weight: 600; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pc-sub   { font-size: 10px; color: var(--text2); margin-top: 2px; }

.badge {
    display: inline-flex;
    align-items: center;
    margin-top: 5px;
    font-size: 9px;
    padding: 1px 7px;
    border-radius: 3px;
    font-weight: 600;
    letter-spacing: .5px;
}
.badge-running { background: var(--primary-dim); color: var(--primary); border: 1px solid rgba(0,229,160,.2); }
.badge-paused  { background: var(--amber-dim);   color: var(--amber);   border: 1px solid rgba(255,179,0,.2); }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

.btn-add {
    margin: 6px;
    padding: 9px;
    background: transparent;
    border: 1px dashed var(--border2);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 11px;
    border-radius: 6px;
    cursor: pointer;
    width: calc(100% - 12px);
    transition: all .15s;
}
.btn-add:hover { border-color: var(--primary); color: var(--primary); }

/* ─── CONTENT ────────────────────────────────────────────────────────────── */
.content { display: flex; flex-direction: column; overflow: hidden; }

.content-head {
    flex-shrink: 0;
    height: 52px;
    background: var(--surf);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 18px;
}
.ch-name { font-size: 13px; font-weight: 600; }
.ch-num  { font-size: 10.5px; color: var(--text2); }
.ch-status {
    font-size: 9.5px; font-weight: 700;
    padding: 2px 9px; border-radius: 3px;
    letter-spacing: 1.5px; text-transform: uppercase;
}
.ch-status.ready        { background: var(--primary-dim); color: var(--primary); border: 1px solid rgba(0,229,160,.25); }
.ch-status.qr           { background: var(--amber-dim);   color: var(--amber);   border: 1px solid rgba(255,179,0,.25); }
.ch-status.initializing { background: var(--blue-dim);    color: var(--blue);    border: 1px solid rgba(77,143,255,.25); }
.ch-status.disconnected,
.ch-status.auth_failed,
.ch-status.error,
.ch-status.offline      { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,68,102,.25); }

.ch-actions { margin-left: auto; display: flex; gap: 7px; }

.btn {
    height: 28px;
    padding: 0 12px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid;
    letter-spacing: 1px;
    transition: all .15s;
    white-space: nowrap;
}
.btn-start  { background: var(--primary-dim);  border-color:rgba(0,229,160,.35);  color:var(--primary); }
.btn-start:hover  { background:var(--primary);  color:var(--bg); }
.btn-pause  { background: var(--amber-dim);    border-color:rgba(255,179,0,.35);  color:var(--amber);   }
.btn-pause:hover  { background:var(--amber);   color:var(--bg); }
.btn-stop   { background: var(--red-dim);      border-color:rgba(255,68,102,.35); color:var(--red);     }
.btn-stop:hover   { background:var(--red);     color:var(--bg); }
.btn-ghost  { background: transparent; border-color:var(--border2); color:var(--text2); }
.btn-ghost:hover  { border-color:var(--red); color:var(--red); }

.content-body {
    flex: 1;
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr;
    padding: 14px;
    gap: 12px;
}

/* ─── PROGRESS PANEL ─────────────────────────────────────────────────────── */
.prog-panel {
    background: var(--surf);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
}
.prog-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
}
.prog-label { font-size: 9.5px; letter-spacing: 2px; text-transform: uppercase; color: var(--text2); }
.prog-subtitle { font-size: 10.5px; color: var(--text2); margin-top: 3px; }
.prog-count { font-size: 22px; font-weight: 700; color: var(--primary); line-height: 1; }
.prog-count span { font-size: 13px; color: var(--text2); font-weight: 400; }
.prog-track { background: var(--surf3); height: 3px; border-radius: 2px; overflow: hidden; }
.prog-fill  {
    height: 100%;
    background: var(--primary);
    box-shadow: 0 0 8px rgba(0,229,160,.6);
    border-radius: 2px;
    transition: width .5s ease;
}
.prog-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 10px;
    color: var(--muted);
}

/* ─── LOG PANEL ──────────────────────────────────────────────────────────── */
.log-panel {
    background: var(--surf);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
}
.log-head {
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
}
.log-title { font-size: 9.5px; letter-spacing: 2px; text-transform: uppercase; color: var(--text2); }
.log-ctrl  { display: flex; gap: 8px; }
.log-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 10px;
    padding: 0 4px;
    transition: color .15s;
}
.log-btn:hover { color: var(--text); }

.log-body {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
}
.log-row {
    display: grid;
    grid-template-columns: 70px 1fr;
    gap: 8px;
    padding: 3px 14px;
    border-radius: 0;
    animation: fadeSlide .18s ease;
    line-height: 1.55;
}
.log-row:hover { background: var(--surf2); }
@keyframes fadeSlide { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:none} }
.log-t { color: var(--muted); font-size: 10px; padding-top: 1px; }
.log-m { font-size: 11.5px; }
.log-row.success .log-m  { color: var(--primary); }
.log-row.error   .log-m  { color: var(--red); }
.log-row.warn    .log-m  { color: var(--amber); }
.log-row.skip    .log-m  { color: var(--muted); }
.log-row.info    .log-m  { color: var(--text); }
.log-row.invalid .log-m  { color: var(--red); opacity:.7; }

/* ─── QR VIEW ────────────────────────────────────────────────────────────── */
.qr-view {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 40px;
}
.qr-box {
    position: relative;
    padding: 6px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 40px rgba(0,229,160,.2);
}
.qr-box img { display: block; width: 220px; height: 220px; border-radius: 6px; }
.qr-corner {
    position: absolute;
    width: 16px; height: 16px;
    border-color: var(--primary);
    border-style: solid;
}
.qr-corner.tl { top:-2px; left:-2px; border-width:2px 0 0 2px; }
.qr-corner.tr { top:-2px; right:-2px; border-width:2px 2px 0 0; }
.qr-corner.bl { bottom:-2px; left:-2px; border-width:0 0 2px 2px; }
.qr-corner.br { bottom:-2px; right:-2px; border-width:0 2px 2px 0; }

.qr-steps { text-align: center; max-width: 320px; }
.qr-steps p { color: var(--text2); font-size: 12px; line-height: 1.7; }
.qr-steps strong { color: var(--primary); }

/* ─── EMPTY / INIT STATES ────────────────────────────────────────────────── */
.empty-view {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: var(--muted);
}
.empty-icon { font-size: 52px; opacity: .25; }
.empty-txt  { font-size: 13px; }

.init-view {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text2);
}
.spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border2);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ─── MODAL ──────────────────────────────────────────────────────────────── */
.overlay {
    position: fixed; inset: 0;
    background: rgba(5,5,10,.82);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
}
.overlay.hidden { display:none; }

.modal {
    background: var(--surf);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 24px;
    width: 380px;
    max-width: 90vw;
    box-shadow: 0 24px 60px rgba(0,0,0,.6);
}
.modal-title {
    font-family: var(--display);
    font-size: 12px;
    letter-spacing: 2.5px;
    color: var(--primary);
    margin-bottom: 20px;
}
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 9.5px; letter-spacing: 2px; text-transform: uppercase; color: var(--text2); margin-bottom: 6px; }
.form-input, .form-textarea {
    width: 100%;
    background: var(--surf2);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 8px 11px;
    border-radius: 5px;
    font-family: var(--mono);
    font-size: 12px;
    transition: border-color .15s;
}
.form-input:focus, .form-textarea:focus { outline: none; border-color: var(--primary); }
.form-textarea { resize: vertical; min-height: 120px; line-height: 1.6; }

.modal-foot { display:flex; gap:8px; justify-content:flex-end; margin-top:18px; }
.btn-cancel  {
    height:30px; padding:0 14px; background:transparent;
    border:1px solid var(--border2); color:var(--text2);
    font-family:var(--mono); font-size:11px; border-radius:4px;
    cursor:pointer; transition: all .15s;
}
.btn-cancel:hover { border-color:var(--text2); color:var(--text); }
.btn-confirm {
    height:30px; padding:0 16px;
    background:var(--primary-dim); border:1px solid rgba(0,229,160,.4);
    color:var(--primary); font-family:var(--mono); font-size:11px;
    font-weight:700; border-radius:4px; cursor:pointer; transition:all .15s;
}
.btn-confirm:hover { background:var(--primary); color:var(--bg); }

/* ─── SETTINGS DRAWER ────────────────────────────────────────────────────── */
.drawer-backdrop {
    position:fixed; inset:0; z-index:50;
    background:rgba(5,5,10,.5); backdrop-filter:blur(2px);
    display:none;
}
.drawer-backdrop.open { display:block; }

.drawer {
    position:fixed; top:0; right:-520px; bottom:0;
    width:480px; background:var(--surf);
    border-left:1px solid var(--border);
    z-index:51; display:flex; flex-direction:column;
    transition:right .28s cubic-bezier(.4,0,.2,1);
    box-shadow: -20px 0 40px rgba(0,0,0,.4);
}
.drawer.open { right:0; }

.drawer-head {
    flex-shrink:0;
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 20px; border-bottom:1px solid var(--border);
}
.drawer-title { font-family:var(--display); font-size:11px; letter-spacing:2.5px; color:var(--primary); }
.drawer-close {
    background:transparent; border:none;
    color:var(--text2); cursor:pointer;
    font-size:20px; line-height:1; padding:0 4px;
}
.drawer-close:hover { color:var(--text); }
.drawer-body { flex:1; overflow-y:auto; padding:20px; }

.save-btn {
    width:100%; height:36px; margin-top:4px;
    background:var(--primary-dim); border:1px solid rgba(0,229,160,.4);
    color:var(--primary); font-family:var(--mono); font-size:12px;
    font-weight:700; border-radius:5px; cursor:pointer; transition:all .15s;
    letter-spacing:1px;
}
.save-btn:hover { background:var(--primary); color:var(--bg); }

/* ─── HISTORY DRAWER ─────────────────────────────────────────────────────── */
.hist-tabs { display:flex; gap:2px; margin-bottom:14px; }
.hist-tab {
    flex:1; height:28px; background:var(--surf2);
    border:1px solid var(--border); color:var(--text2);
    font-family:var(--mono); font-size:10.5px; border-radius:4px;
    cursor:pointer; transition:all .15s;
}
.hist-tab.active { background:var(--primary-dim); border-color:rgba(0,229,160,.3); color:var(--primary); }

.hist-list { display:flex; flex-direction:column; gap:4px; }
.hist-item {
    background:var(--surf2); border:1px solid var(--border);
    border-radius:4px; padding:8px 12px;
    display:flex; justify-content:space-between; align-items:center;
    font-size:11px;
}
.hist-name { font-weight:600; }
.hist-num  { color:var(--text2); font-size:10px; }
.hist-date { color:var(--muted); font-size:10px; }

/* ─── TOASTS ─────────────────────────────────────────────────────────────── */
.toast-rack {
    position:fixed; bottom:20px; right:20px;
    display:flex; flex-direction:column-reverse; gap:8px; z-index:200;
}
.toast {
    background:var(--surf); border:1px solid var(--border2);
    padding:10px 16px; border-radius:6px; font-size:12px;
    animation:toastIn .25s ease;
    max-width:320px; line-height:1.4;
}
.toast.ok   { border-color:rgba(0,229,160,.4); color:var(--primary); }
.toast.err  { border-color:rgba(255,68,102,.4); color:var(--red); }
.toast.warn { border-color:rgba(255,179,0,.4);  color:var(--amber); }
@keyframes toastIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
</style>
</head>
<body>

<!-- ─── TOP BAR ─────────────────────────────────────────────────────────── -->
<div class="topbar">
    <div class="logo">ZAP<em>BOT</em></div>
    <div class="topbar-divider"></div>
    <div class="global-stats">
        <div class="gstat">📤 <span class="gstat-val g" id="g-sent">0</span> enviados</div>
        <div class="gstat">❌ <span class="gstat-val r" id="g-inv">0</span> inválidos</div>
        <div class="gstat">⚠ <span class="gstat-val a" id="g-err">0</span> erros</div>
    </div>
    <div class="topbar-right">
        <div class="ws-indicator">
            <div class="ws-dot" id="ws-dot"></div>
            <span id="ws-txt">conectando...</span>
        </div>
        <div class="topbar-divider"></div>
        <button class="topbtn" onclick="openApify()">APIFY</button>
        <button class="topbtn" onclick="openHistory()">📋 Histórico</button>
        <button class="topbtn" onclick="openSettings()">⚙ Configurações</button>
    </div>
</div>

<!-- ─── WORKSPACE ────────────────────────────────────────────────────────── -->
<div class="workspace">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-head">
            <span>📱 Telefones</span>
            <span id="phone-count" style="color:var(--primary);font-weight:700">0</span>
        </div>
        <div class="phones-list" id="phones-list">
            <div style="padding:20px;text-align:center;color:var(--muted);font-size:11px">Carregando...</div>
        </div>
        <button class="btn-add" onclick="showAddPhone()">＋ Adicionar Telefone</button>
    </div>

    <!-- Content -->
    <div class="content" id="main-content">
        <div class="empty-view">
            <div class="empty-icon">📲</div>
            <div class="empty-txt">Selecione um telefone à esquerda</div>
        </div>
    </div>
</div>

<!-- ─── ADD PHONE MODAL ──────────────────────────────────────────────────── -->
<div class="overlay hidden" id="add-modal" onclick="closeAddPhone(event)">
    <div class="modal" onclick.stop>
        <div class="modal-title">ADICIONAR TELEFONE</div>
        <div class="form-group">
            <label class="form-label">Nome / Identificador</label>
            <input class="form-input" id="new-label" placeholder="Ex: Wender — Número 2" />
        </div>
        <div class="modal-foot">
            <button class="btn-cancel" onclick="closeAddPhone()">Cancelar</button>
            <button class="btn-confirm" onclick="doAddPhone()">Conectar →</button>
        </div>
    </div>
</div>

<!-- ─── SETTINGS DRAWER ──────────────────────────────────────────────────── -->
<div class="drawer-backdrop" id="settings-backdrop" onclick="closeSettings()"></div>
<div class="drawer" id="settings-drawer">
    <div class="drawer-head">
        <div class="drawer-title">CONFIGURAÇÕES</div>
        <button class="drawer-close" onclick="closeSettings()">×</button>
    </div>
    <div class="drawer-body">
        <div class="form-group">
            <label class="form-label">Arquivo CSV</label>
            <input class="form-input" id="cfg-csv" placeholder="advocacia1.csv" />
        </div>
        <div class="form-group">
            <label class="form-label">Limite Diário de Disparos</label>
            <input class="form-input" id="cfg-limit" type="number" min="1" max="500" />
        </div>
        <div class="form-group">
            <label class="form-label">Pausa entre mensagens (segundos)</label>
            <input class="form-input" id="cfg-pause" type="number" min="10" />
        </div>
        <div class="form-group">
            <label class="form-label">Pausa inicial de sincronização (segundos)</label>
            <input class="form-input" id="cfg-sync" type="number" min="0" />
        </div>
        <div class="form-group">
            <label class="form-label">Mensagem (use {nome} e {cidade})</label>
            <textarea class="form-textarea" id="cfg-msg" rows="12"></textarea>
        </div>
        <button class="save-btn" onclick="saveSettings()">💾 SALVAR CONFIGURAÇÕES</button>
    </div>
</div>

<!-- ─── HISTORY DRAWER ────────────────────────────────────────────────────── -->
<!-- APIFY DRAWER -->
<div class="drawer-backdrop" id="apify-backdrop" onclick="closeApify()"></div>
<div class="drawer" id="apify-drawer">
    <div class="drawer-head">
        <div class="drawer-title">APIFY LEADS</div>
        <button class="drawer-close" onclick="closeApify()">×</button>
    </div>
    <div class="drawer-body">
        <div class="form-group">
            <label class="form-label">API Token</label>
            <input class="form-input" id="apify-token" type="password" placeholder="Cole uma vez para salvar localmente" />
        </div>
        <button class="save-btn" onclick="saveApifyToken()">SALVAR TOKEN</button>

        <div class="form-group" style="margin-top:18px">
            <label class="form-label">Actor ID</label>
            <input class="form-input" id="apify-actor" placeholder="nwua9Gu5YrADL7ZDj" />
        </div>
        <div class="form-group">
            <label class="form-label">CSV de Saída</label>
            <input class="form-input" id="apify-csv" placeholder="apify_leads.csv" />
        </div>
        <div class="form-group">
            <label class="form-label">Input JSON</label>
            <textarea class="form-textarea" id="apify-input" rows="14"></textarea>
        </div>
        <button class="save-btn" onclick="startApifyRun()">INICIAR SCRAPER</button>

        <div class="form-group" style="margin-top:18px">
            <label class="form-label">Termos do Segmento</label>
            <textarea class="form-textarea" id="apify-terms" rows="5"></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Regiões do Lote</label>
            <textarea class="form-textarea" id="apify-regions" rows="8"></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Máximo de Regiões nesta Rodada</label>
            <input class="form-input" id="apify-max-runs" type="number" min="1" max="200" />
        </div>
        <button class="save-btn" onclick="startApifyBatch()">RODAR LOTE POR REGIÕES</button>
        <button class="btn btn-stop" onclick="stopApifyBatch()" style="width:100%;height:34px;margin-top:8px">PARAR LOTE</button>

        <div class="form-group" style="margin-top:18px">
            <label class="form-label">Última execução</label>
            <div class="hist-item">
                <div>
                    <div class="hist-name" id="apify-run-id">Nenhuma execução nesta sessão</div>
                    <div class="hist-num" id="apify-run-status">Aguardando</div>
                </div>
                <button class="btn btn-start" id="apify-import-btn" onclick="importApifyRun()" style="display:none">IMPORTAR</button>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Lote automático</label>
            <div class="hist-item">
                <div>
                    <div class="hist-name" id="apify-batch-status">Inativo</div>
                    <div class="hist-num" id="apify-batch-detail">Nenhuma rodada em execução</div>
                </div>
            </div>
        </div>
        <div class="log-panel" style="height:240px;margin-top:14px">
            <div class="log-head">
                <span class="log-title">Log da Apify</span>
                <div class="log-ctrl">
                    <button class="log-btn" onclick="clearApifyLogs()">limpar</button>
                </div>
            </div>
            <div class="log-body" id="apify-log"></div>
        </div>
    </div>
</div>

<div class="drawer-backdrop" id="hist-backdrop" onclick="closeHistory()"></div>
<div class="drawer" id="hist-drawer">
    <div class="drawer-head">
        <div class="drawer-title">HISTÓRICO</div>
        <button class="drawer-close" onclick="closeHistory()">×</button>
    </div>
    <div class="drawer-body">
        <div class="hist-tabs">
            <button class="hist-tab active" data-cat="enviado"  onclick="switchHistTab(this,'enviado')">✔ Enviados</button>
            <button class="hist-tab"        data-cat="invalido" onclick="switchHistTab(this,'invalido')">✕ Inválidos</button>
            <button class="hist-tab"        data-cat="erro"     onclick="switchHistTab(this,'erro')">⚠ Erros</button>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
            <button class="btn-ghost btn" style="height:24px;font-size:10px" onclick="clearHistCategory()">🗑 Limpar categoria</button>
        </div>
        <div class="hist-list" id="hist-list">
            <div style="color:var(--muted);text-align:center;padding:20px;font-size:11px">Carregando...</div>
        </div>
    </div>
</div>

<!-- ─── TOASTS ────────────────────────────────────────────────────────────── -->
<div class="toast-rack" id="toasts"></div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────
const S = {
    phones: [],
    config: {},
    stats: { enviado: 0, invalido: 0, erro: 0 },
    selected: null,
    logs: {},      // phoneId → [{type,message,time}]
    histCat: 'enviado',
    apify: { runId: null, polling: null, importedRuns: new Set(), logs: [] }
};

// ─── SOCKET ───────────────────────────────────────────────────────────────
const socket = io();

socket.on('connect', () => {
    document.getElementById('ws-dot').classList.add('on');
    document.getElementById('ws-txt').textContent = 'online';
});
socket.on('disconnect', () => {
    document.getElementById('ws-dot').classList.remove('on');
    document.getElementById('ws-txt').textContent = 'desconectado';
});

socket.on('init', ({ phones, config, stats }) => {
    S.phones = phones;
    S.config = config;
    S.stats  = stats;
    updateGlobalStats();
    renderSidebar();
    loadSettingsForm();
});

socket.on('phone:qr', ({ id, qr }) => {
    const p = phone(id);
    if (p) p.qr = qr;
    if (S.selected === id) renderMain();
    renderSidebar();
});

socket.on('phone:update', (patch) => {
    const p = phone(patch.id);
    if (p) Object.assign(p, patch);
    renderSidebar();
    if (S.selected === patch.id) renderMain();
});

socket.on('phone:removed', ({ id }) => {
    S.phones = S.phones.filter(p => p.id !== id);
    if (S.selected === id) S.selected = null;
    renderSidebar();
    renderMain();
});

socket.on('log', ({ phoneId, type, message, time }) => {
    if (!S.logs[phoneId]) S.logs[phoneId] = [];
    S.logs[phoneId].unshift({ type, message, time });
    if (S.logs[phoneId].length > 300) S.logs[phoneId].length = 300;
    if (S.selected === phoneId) injectLogRow({ type, message, time }, phoneId);
});

socket.on('stats:update', (stats) => {
    S.stats = stats;
    updateGlobalStats();
});

socket.on('apify:update', (run) => {
    updateApifyRun(run);
});

socket.on('apify:batch', (batch) => {
    updateApifyBatch(batch);
});

socket.on('apify:log', (entry) => {
    addApifyLog(entry);
});

// ─── HELPERS ─────────────────────────────────────────────────────────────
function phone(id) { return S.phones.find(p => p.id === id); }

function statusLabel(s) {
    return { ready:'PRONTO', qr:'AGUARDANDO QR', initializing:'INICIALIZANDO',
             disconnected:'DESCONECTADO', auth_failed:'FALHA AUTH',
             error:'ERRO', offline:'OFFLINE' }[s] || s;
}

function statusSub(s) {
    return { ready:'Conectado', qr:'Escaneie o QR Code', initializing:'Aguarde...',
             disconnected:'Reconecte o telefone', auth_failed:'Remova e reconecte',
             error:'Erro ao inicializar', offline:'Offline' }[s] || '';
}

function fmtTime(iso) {
    return new Date(iso).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function updateGlobalStats() {
    document.getElementById('g-sent').textContent = S.stats.enviado;
    document.getElementById('g-inv').textContent  = S.stats.invalido;
    document.getElementById('g-err').textContent  = S.stats.erro;
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────
function renderSidebar() {
    document.getElementById('phone-count').textContent = S.phones.length;
    const list = document.getElementById('phones-list');

    if (!S.phones.length) {
        list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:11px">Nenhum telefone ainda</div>';
        return;
    }

    list.innerHTML = S.phones.map(p => {
        const campaign = p.campaign;
        const badge = campaign
            ? (p.paused
                ? '<span class="badge badge-paused">⏸ PAUSADO</span>'
                : '<span class="badge badge-running">▶ DISPARANDO</span>')
            : '';

        return `<div class="phone-card s-${p.status||'offline'} ${S.selected===p.id?'selected':''}"
                     onclick="selectPhone('${p.id}')">
            <div class="pc-label">${p.label}</div>
            <div class="pc-sub">${p.number ? '+'+p.number : statusSub(p.status)}</div>
            ${badge}
        </div>`;
    }).join('');
}

// ─── SELECT PHONE ─────────────────────────────────────────────────────────
function selectPhone(id) {
    S.selected = id;
    renderSidebar();
    renderMain();
}

// ─── MAIN CONTENT ─────────────────────────────────────────────────────────
function renderMain() {
    const wrap = document.getElementById('main-content');

    if (!S.selected) {
        wrap.innerHTML = `<div class="empty-view">
            <div class="empty-icon">📲</div>
            <div class="empty-txt">Selecione um telefone à esquerda</div>
        </div>`;
        return;
    }

    const p = phone(S.selected);
    if (!p) { S.selected = null; renderMain(); return; }

    const limit  = S.config.limiteDiario || 40;
    const sent   = p.campaign?.sent || 0;
    const pct    = Math.min((sent / limit) * 100, 100).toFixed(1);

    const canStart = p.status === 'ready' && (!p.campaign || p.paused);
    const canPause = p.status === 'ready' && p.campaign && !p.paused;
    const canStop  = p.status === 'ready' && p.campaign;

    const statusHtml = (p.status === 'initializing')
        ? `<div class="init-view">
                <div class="spinner"></div>
                <div>Inicializando cliente WhatsApp...</div>
           </div>`
        : (p.status === 'qr' && p.qr)
        ? `<div class="qr-view">
                <div class="qr-box">
                    <img src="${p.qr}" />
                    <div class="qr-corner tl"></div><div class="qr-corner tr"></div>
                    <div class="qr-corner bl"></div><div class="qr-corner br"></div>
                </div>
                <div class="qr-steps">
                    <p>Abra o <strong>WhatsApp</strong> no celular<br>
                    Vá em <strong>Dispositivos Vinculados → Vincular Dispositivo</strong><br>
                    e escaneie o código acima</p>
                </div>
           </div>`
        : `<div class="content-body">
                <div class="prog-panel">
                    <div class="prog-top">
                        <div>
                            <div class="prog-label">Progresso da Campanha</div>
                            <div class="prog-subtitle">${p.campaign ? (p.paused ? '⏸ Pausado' : '▶ Em execução') : '— Aguardando início'}</div>
                        </div>
                        <div class="prog-count">${sent}<span> / ${limit}</span></div>
                    </div>
                    <div class="prog-track"><div class="prog-fill" id="pbar" style="width:${pct}%"></div></div>
                    <div class="prog-footer"><span>${sent} enviados hoje</span><span>${limit - sent} restantes</span></div>
                </div>
                <div class="log-panel">
                    <div class="log-head">
                        <span class="log-title">Atividade em Tempo Real</span>
                        <div class="log-ctrl">
                            <button class="log-btn" onclick="clearLogs('${p.id}')">limpar</button>
                        </div>
                    </div>
                    <div class="log-body" id="log-${p.id}">
                        ${(S.logs[p.id] || []).map(e => logRowHtml(e)).join('')}
                    </div>
                </div>
           </div>`;

    wrap.innerHTML = `
        <div class="content-head">
            <div class="ch-name">${p.label}</div>
            ${p.number ? `<div class="ch-num">+${p.number}</div>` : ''}
            <div class="ch-status ${p.status}">${statusLabel(p.status)}</div>
            <div class="ch-actions">
                ${canStart ? `<button class="btn btn-start" onclick="doStart('${p.id}')">▶ INICIAR</button>` : ''}
                ${canPause ? `<button class="btn btn-pause" onclick="doPause('${p.id}')">⏸ PAUSAR</button>` : ''}
                ${canStop  ? `<button class="btn btn-stop"  onclick="doStop('${p.id}')">⏹ PARAR</button>`   : ''}
                <button class="btn btn-ghost" onclick="doRemove('${p.id}')">🗑</button>
            </div>
        </div>
        ${statusHtml}
    `;
}

function logRowHtml(e) {
    return `<div class="log-row ${e.type}">
        <span class="log-t">${fmtTime(e.time)}</span>
        <span class="log-m">${escHtml(e.message)}</span>
    </div>`;
}

function injectLogRow(entry, phoneId) {
    const body = document.getElementById(`log-${phoneId}`);
    if (!body) return;
    const div = document.createElement('div');
    div.innerHTML = logRowHtml(entry);
    body.insertBefore(div.firstElementChild, body.firstChild);
}

function clearLogs(id) {
    S.logs[id] = [];
    const el = document.getElementById(`log-${id}`);
    if (el) el.innerHTML = '';
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── CAMPAIGN ACTIONS ─────────────────────────────────────────────────────
async function doStart(id) {
    const r = await fetch(`/api/phones/${id}/start`, { method:'POST' });
    const d = await r.json();
    if (!r.ok) toast(d.error || 'Erro', 'err');
}
async function doPause(id) { await fetch(`/api/phones/${id}/pause`, { method:'POST' }); }
async function doStop(id)  { await fetch(`/api/phones/${id}/stop`,  { method:'POST' }); }
async function doRemove(id) {
    if (!confirm(`Remover "${phone(id)?.label}"? A sessão será desconectada.`)) return;
    await fetch(`/api/phones/${id}`, { method:'DELETE' });
}

// ─── ADD PHONE ────────────────────────────────────────────────────────────
function showAddPhone() {
    document.getElementById('add-modal').classList.remove('hidden');
    setTimeout(() => document.getElementById('new-label').focus(), 50);
}
function closeAddPhone(e) {
    if (e && e.target !== document.getElementById('add-modal')) return;
    document.getElementById('add-modal').classList.add('hidden');
    document.getElementById('new-label').value = '';
}
async function doAddPhone() {
    const label = document.getElementById('new-label').value.trim() || 'Novo Telefone';
    document.getElementById('add-modal').classList.add('hidden');
    document.getElementById('new-label').value = '';

    const r = await fetch('/api/phones', {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify({ label })
    });
    const d = await r.json();

    S.phones.push({ id: d.id, label, status: 'initializing', number: null });
    renderSidebar();
    selectPhone(d.id);
    toast('Telefone adicionado! Aguarde o QR Code...', 'ok');
}

// ─── SETTINGS ─────────────────────────────────────────────────────────────
function openSettings() {
    document.getElementById('settings-drawer').classList.add('open');
    document.getElementById('settings-backdrop').classList.add('open');
}
function closeSettings() {
    document.getElementById('settings-drawer').classList.remove('open');
    document.getElementById('settings-backdrop').classList.remove('open');
}
function loadSettingsForm() {
    const c = S.config;
    document.getElementById('cfg-csv').value   = c.arquivoCSV || '';
    document.getElementById('cfg-limit').value = c.limiteDiario || 40;
    document.getElementById('cfg-pause').value = c.pausaEntreMensagens || 90;
    document.getElementById('cfg-sync').value  = c.pausaInicial || 45;
    document.getElementById('cfg-msg').value   = c.mensagem || '';
}
async function saveSettings() {
    const cfg = {
        ...S.config,
        arquivoCSV:           document.getElementById('cfg-csv').value.trim(),
        limiteDiario:         parseInt(document.getElementById('cfg-limit').value),
        pausaEntreMensagens:  parseInt(document.getElementById('cfg-pause').value),
        pausaInicial:         parseInt(document.getElementById('cfg-sync').value),
        mensagem:             document.getElementById('cfg-msg').value
    };
    const r = await fetch('/api/config', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(cfg)
    });
    if (r.ok) { S.config = cfg; closeSettings(); toast('Configurações salvas!', 'ok'); }
    else toast('Erro ao salvar', 'err');
}

// ─── HISTORY ──────────────────────────────────────────────────────────────
function openApify() {
    document.getElementById('apify-drawer').classList.add('open');
    document.getElementById('apify-backdrop').classList.add('open');
    loadApifyState();
}
function closeApify() {
    document.getElementById('apify-drawer').classList.remove('open');
    document.getElementById('apify-backdrop').classList.remove('open');
}
async function loadApifyState() {
    const r = await fetch('/api/apify/state');
    const d = await r.json();
    document.getElementById('apify-actor').value = d.actorId || '';
    document.getElementById('apify-csv').value = d.outputCSV || 'apify_leads.csv';
    document.getElementById('apify-input').value = JSON.stringify(d.input || {}, null, 2);
    document.getElementById('apify-terms').value = (d.segmentTerms || []).join('\n');
    document.getElementById('apify-regions').value = (d.regions || []).join('\n');
    document.getElementById('apify-max-runs').value = d.autoMaxRuns || 20;
    document.getElementById('apify-token').placeholder = d.hasToken ? 'Token salvo localmente' : 'Cole uma vez para salvar localmente';
    if (d.runs && d.runs[0]) updateApifyRun(d.runs[0]);
    if (d.batch) updateApifyBatch(d.batch);
    S.apify.logs = d.logs || [];
    renderApifyLogs();
}
async function saveApifyToken() {
    const token = document.getElementById('apify-token').value.trim();
    if (!token) return toast('Cole o token da Apify', 'warn');
    const r = await fetch('/api/apify/token', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ token })
    });
    const d = await r.json();
    if (!r.ok) return toast(d.error || 'Erro ao salvar token', 'err');
    document.getElementById('apify-token').value = '';
    document.getElementById('apify-token').placeholder = 'Token salvo localmente';
    toast('Token da Apify salvo', 'ok');
}
async function startApifyRun() {
    let input;
    try { input = JSON.parse(document.getElementById('apify-input').value); }
    catch (_) { return toast('Input JSON inválido', 'err'); }

    const r = await fetch('/api/apify/run', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            actorId: document.getElementById('apify-actor').value.trim(),
            outputCSV: document.getElementById('apify-csv').value.trim(),
            input
        })
    });
    const d = await r.json();
    if (!r.ok) return toast(d.error || 'Erro ao iniciar Apify', 'err');
    updateApifyRun(d);
    toast('Scraper iniciado na Apify', 'ok');
    pollApifyRun(d.id);
}
function updateApifyRun(run) {
    if (!run || !run.id) return;
    S.apify.runId = run.id;
    document.getElementById('apify-run-id').textContent = run.id;
    document.getElementById('apify-run-status').textContent =
        `${run.status || 'UNKNOWN'}${run.imported ? ` - ${run.imported}/${run.total} importados` : ''}`;
    document.getElementById('apify-import-btn').style.display = run.status === 'SUCCEEDED' ? '' : 'none';
    if (run.status === 'SUCCEEDED' && !S.apify.importedRuns.has(run.id)) {
        S.apify.importedRuns.add(run.id);
        importApifyRun(true);
    }
}
function pollApifyRun(id) {
    clearInterval(S.apify.polling);
    S.apify.polling = setInterval(async () => {
        const r = await fetch(`/api/apify/run/${id}`);
        const d = await r.json();
        if (!r.ok) { clearInterval(S.apify.polling); return toast(d.error || 'Erro ao consultar Apify', 'err'); }
        updateApifyRun(d);
        if (['SUCCEEDED','FAILED','ABORTED','TIMED-OUT'].includes(d.status)) clearInterval(S.apify.polling);
    }, 10000);
}
async function importApifyRun(auto = false) {
    if (!S.apify.runId) return;
    const r = await fetch(`/api/apify/run/${S.apify.runId}/import`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ outputCSV: document.getElementById('apify-csv').value.trim() })
    });
    const d = await r.json();
    if (!r.ok) return toast(d.error || 'Erro ao importar leads', 'err');
    S.config.arquivoCSV = d.fileName;
    document.getElementById('cfg-csv').value = d.fileName;
    toast(`${d.imported} leads importados para ${d.fileName}${auto ? ' automaticamente' : ''}`, 'ok');
}
function addApifyLog(entry) {
    S.apify.logs.unshift(entry);
    if (S.apify.logs.length > 300) S.apify.logs.length = 300;
    renderApifyLogs();
}
function renderApifyLogs() {
    const el = document.getElementById('apify-log');
    if (!el) return;
    el.innerHTML = (S.apify.logs || []).map(logRowHtml).join('');
}
function clearApifyLogs() {
    S.apify.logs = [];
    renderApifyLogs();
}
function listFromTextarea(id) {
    return document.getElementById(id).value
        .split(/\r?\n|,/)
        .map(item => item.trim())
        .filter(Boolean);
}
async function startApifyBatch() {
    let input;
    try { input = JSON.parse(document.getElementById('apify-input').value); }
    catch (_) { return toast('Input JSON inválido', 'err'); }

    const regions = listFromTextarea('apify-regions');
    const segmentTerms = listFromTextarea('apify-terms');
    if (!regions.length) return toast('Informe ao menos uma região', 'warn');
    if (!segmentTerms.length) return toast('Informe ao menos um termo do segmento', 'warn');

    const r = await fetch('/api/apify/batch/start', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            actorId: document.getElementById('apify-actor').value.trim(),
            outputCSV: document.getElementById('apify-csv').value.trim(),
            input,
            segmentTerms,
            regions,
            maxRuns: parseInt(document.getElementById('apify-max-runs').value) || regions.length
        })
    });
    const d = await r.json();
    if (!r.ok) return toast(d.error || 'Erro ao iniciar lote', 'err');
    updateApifyBatch(d.batch);
    toast('Lote da Apify iniciado', 'ok');
}
async function stopApifyBatch() {
    const r = await fetch('/api/apify/batch/stop', { method:'POST' });
    const d = await r.json();
    if (!r.ok) return toast(d.error || 'Erro ao parar lote', 'err');
    updateApifyBatch(d.batch);
    toast('Parada solicitada', 'warn');
}
function updateApifyBatch(batch) {
    if (!batch) return;
    document.getElementById('apify-batch-status').textContent = batch.status || 'idle';
    const parts = [
        batch.currentRegion ? `região: ${batch.currentRegion}` : null,
        batch.processedRegions != null ? `${batch.processedRegions}/${(batch.regions || []).length} regiões` : null,
        batch.imported != null ? `${batch.imported} leads novos` : null,
        batch.error ? `erro: ${batch.error}` : null
    ].filter(Boolean);
    document.getElementById('apify-batch-detail').textContent = parts.join(' • ') || 'Nenhuma rodada em execução';
}

function openHistory() {
    document.getElementById('hist-drawer').classList.add('open');
    document.getElementById('hist-backdrop').classList.add('open');
    fetchHistory();
}
function closeHistory() {
    document.getElementById('hist-drawer').classList.remove('open');
    document.getElementById('hist-backdrop').classList.remove('open');
}
function switchHistTab(el, cat) {
    document.querySelectorAll('.hist-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    S.histCat = cat;
    fetchHistory();
}
async function fetchHistory() {
    document.getElementById('hist-list').innerHTML =
        '<div style="color:var(--muted);text-align:center;padding:20px;font-size:11px">Carregando...</div>';
    const r = await fetch(`/api/history?category=${S.histCat}&limit=100`);
    const { data, total } = await r.json();
    const list = document.getElementById('hist-list');
    if (!data.length) {
        list.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px;font-size:11px">Nenhum registro</div>';
        return;
    }
    list.innerHTML = `<div style="font-size:10px;color:var(--text2);margin-bottom:8px">${total} registros</div>` +
        data.map(item => `<div class="hist-item">
            <div><div class="hist-name">${escHtml(item.nome)}</div><div class="hist-num">${item.numero}</div></div>
            <div class="hist-date">${new Date(item.data).toLocaleString('pt-BR')}</div>
        </div>`).join('');
}
async function clearHistCategory() {
    if (!confirm(`Limpar todos os registros de "${S.histCat}"?`)) return;
    const r = await fetch(`/api/history/${S.histCat}`, { method:'DELETE' });
    if (r.ok) { fetchHistory(); toast('Registros limpos', 'ok'); }
}

// ─── TOAST ────────────────────────────────────────────────────────────────
function toast(msg, type = 'ok') {
    const rack = document.getElementById('toasts');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    rack.appendChild(el);
    setTimeout(() => el.remove(), 3500);
}

// ─── KEYBOARD ─────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        document.getElementById('add-modal').classList.add('hidden');
        closeApify();
        closeSettings();
        closeHistory();
    }
});
</script>
